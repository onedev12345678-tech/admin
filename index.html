<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONX-1 | SUPER ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-dark: #0066ff;
            --bg: #1a1c23; 
            --card-bg: rgba(45, 48, 60, 0.95);
            --border: rgba(0, 242, 255, 0.3);
            --danger: #ff4444;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top left, #252836 0%, #1a1c23 100%);
            color: white; font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 28px;
            padding: 30px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif; font-size: 18px;
            letter-spacing: 3px; color: var(--accent); text-align: center;
            margin-bottom: 25px; text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        .input-box { margin-bottom: 15px; }
        label { font-size: 10px; text-transform: uppercase; color: #aaa; margin-left: 5px; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-size: 14px; box-sizing: border-box;
        }

        .duration-group { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }

        .btn-generate {
            width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none; border-radius: 14px; color: #000; font-family: 'Orbitron';
            font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }

        /* --- LIST USER STYLE --- */
        .user-list-container {
            background: rgba(0,0,0,0.3); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); padding: 20px;
        }

        .list-title {
            font-family: 'Orbitron'; font-size: 12px; color: var(--accent);
            margin-bottom: 15px; display: flex; justify-content: space-between;
        }

        .user-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 12px 15px;
            border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--accent);
        }

        .user-info b { font-size: 14px; color: #fff; display: block; }
        .user-info span { font-size: 10px; color: #777; }
        .status-active { color: #00ff64 !important; }
        .status-expired { color: var(--danger) !important; }

        .btn-delete {
            background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.2);
            padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-delete:hover { background: var(--danger); }
        .btn-delete svg { fill: var(--danger); width: 16px; height: 16px; transition: 0.3s; }
        .btn-delete:hover svg { fill: white; }

        #empty-msg { text-align: center; font-size: 11px; color: #555; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h2>GENERATE ACCESS</h2>
        <div class="input-box">
            <label>Username</label>
            <input type="text" id="username" placeholder="User baru">
        </div>
        <div class="input-box">
            <label>Password</label>
            <input type="text" id="password" placeholder="Pass baru">
        </div>
        <div class="input-box">
            <label>Durasi</label>
            <div class="duration-group">
                <input type="number" id="durasi_nilai" value="1">
                <select id="durasi_unit">
                    <option value="1">JAM</option>
                    <option value="24">HARI</option>
                </select>
            </div>
        </div>
        <button class="btn-generate" onclick="buatLink()">CREATE ACCESS</button>
    </div>

    <div class="glass-card user-list-container">
        <div class="list-title">
            <span>DATABASE USERS</span>
            <span id="user-count">0</span>
        </div>
        <div id="user-list-display">
            <div id="empty-msg">Mengambil data dari database...</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyC3_Mu644DfvIvRk-uw4UGmXEnjvSgpd1s",
  authDomain: "coba-70608.firebaseapp.com",
  // Perhatikan baris di bawah ini, gua tambahin manual sesuai project id lu
  databaseURL: "https://coba-70608-default-rtdb.asia-southeast1.firebasedatabase.app", 
  projectId: "coba-70608",
  storageBucket: "coba-70608.firebaseapp.com",
  messagingSenderId: "54930111072",
  appId: "1:54930111072:web:c09e6cd6e4e0177ce46105",
  measurementId: "G-NJXNLLDL3H"
};


    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Jalankan List User saat pertama buka
    loadUsers();

    function buatLink() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const d_nilai = document.getElementById('durasi_nilai').value;
        const d_unit = document.getElementById('durasi_unit').value;
        
        if(!u || !p || !d_nilai) return alert("Lengkapi data!");

        const jamKeMili = parseInt(d_nilai) * parseInt(d_unit) * 60 * 60 * 1000;
        const exp = new Date().getTime() + jamKeMili;
        
        db.ref('registered_users/' + u).set({
            password: p,
            expiry: exp
        }).then(() => {
            const targetWeb = "https://onedev12345678-tech.github.io/shope-cod/";
            const linkSakti = targetWeb + "?reg_u=" + u + "&reg_p=" + p;
            navigator.clipboard.writeText(linkSakti).then(() => {
                alert("SUKSES! Link sudah tersalin ke clipboard.");
            });
        });
    }

    function loadUsers() {
        db.ref('registered_users').on('value', (snapshot) => {
            const listDisplay = document.getElementById('user-list-display');
            const countDisplay = document.getElementById('user-count');
            listDisplay.innerHTML = '';
            
            const data = snapshot.val();
            if(!data) {
                listDisplay.innerHTML = '<div id="empty-msg">Tidak ada user terdaftar.</div>';
                countDisplay.innerText = "0";
                return;
            }

            const keys = Object.keys(data);
            countDisplay.innerText = keys.length;

            keys.forEach(user => {
                const info = data[user];
                const now = new Date().getTime();
                const isExpired = now > info.expiry;
                const dateStr = new Date(info.expiry).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });

                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerHTML = `
                    <div class="user-info">
                        <b>${user}</b>
                        <span class="${isExpired ? 'status-expired' : 'status-active'}">
                            ${isExpired ? 'EXPIRED' : 'ACTIVE UNTIL: ' + dateStr}
                        </span>
                    </div>
                    <button class="btn-delete" onclick="hapusUser('${user}')">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                `;
                listDisplay.appendChild(item);
            });
        });
    }

    function hapusUser(username) {
        if(confirm(`Hapus akun ${username} secara permanen?`)) {
            db.ref('registered_users/' + username).remove()
            .then(() => alert("Akun berhasil dihapus."));
        }
    }
</script>

</body>
</html>
