<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Account Tool</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

input{
    background:#334155;
    color:white;
}

button{
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button.delete{
    background:#ef4444;
}

#result{
    margin-top:15px;
    background:#111827;
    padding:10px;
    border-radius:10px;
    word-break:break-all;
}
</style>
</head>
<body>

<div class="box">
    <h2>Firebase Account Creator</h2>

    <input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<input id="days" type="number" placeholder="Durasi hari">

<button onclick="createAccount()">
BUAT AKUN
</button>

<button onclick="deleteAccount()">
HAPUS AKUN
</button>

    <div id="result"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC3_Mu644DfvIvRk-uw4UGmXEnjvSgpd1s",
  authDomain: "coba-70608.firebaseapp.com",
  databaseURL: "https://coba-70608-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "coba-70608",
  storageBucket: "coba-70608.firebasestorage.app",
  messagingSenderId: "54930111072",
  appId: "1:54930111072:web:c09e6cd6e4e0177ce46105"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.createAccount = async function(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const days = parseInt(document.getElementById("days").value);

    if(!username || !password || !days){
        return alert("Isi semua data");
    }

    const expiry =
        Date.now() + (days * 24 * 60 * 60 * 1000);

    await set(
        ref(db, "registered_users/" + username),
        {
            password: password,
            expiry: expiry
        }
    );

    alert("Akun berhasil dibuat");
}

window.deleteAccount = async function(){

    const username =
        document.getElementById("username").value;

    await remove(
        ref(db, "registered_users/" + username)
    );

    alert("Akun berhasil dihapus");
}

</script>

</script>

</body>
</html>
